name: hospital-mis

services:
  mongo:
    image: mongo:8.0.14
    command: ['mongod', '--bind_ip_all']
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand({ ping: 1 }).ok']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      API_PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/hospital_mis
      MONGODB_APP_NAME: hospital-mis-api
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: 5000
      LOG_LEVEL: info
      CORS_ORIGINS: http://localhost:3000
      SOCKET_IO_PATH: /socket.io
      READINESS_TIMEOUT_MS: 3000
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - '4000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/api/v1/ready').then(r=>{if(!r.ok)process.exit(1)})",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongo:27017/hospital_mis
      MONGODB_APP_NAME: hospital-mis-worker
      MONGODB_SERVER_SELECTION_TIMEOUT_MS: 5000
      LOG_LEVEL: info
      READINESS_TIMEOUT_MS: 3000
      WORKER_ID: worker-docker-1
      WORKER_HEALTH_INTERVAL_MS: 15000
      WORKER_SHUTDOWN_TIMEOUT_MS: 10000
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_SOCKET_URL: http://localhost:3000
        VITE_SOCKET_PATH: /socket.io
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  mongo-data:
